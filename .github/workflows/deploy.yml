name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  backend-deploy:
    runs-on: ubuntu-latest
    # This logic checks if any of the changed files are in the backend/ folder
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Necessary to check for changes

      - name: Check for Backend Changes
        id: check_backend
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^backend/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.check_backend.outputs.changed == 'true' || contains(github.event.head_commit.message, '[all]')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and Push Backend
        if: steps.check_backend.outputs.changed == 'true' || contains(github.event.head_commit.message, '[all]')
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:latest

      - name: Deploy Backend to EC2
        if: steps.check_backend.outputs.changed == 'true' || contains(github.event.head_commit.message, '[all]')
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PAT }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-app:latest
            docker stop backend-app || true
            docker rm backend-app || true
            docker run -d \
              --name backend-app \
              -p 5000:5000 \
              --restart always \
              --env-file /home/${{ secrets.EC2_USER }}/projects/environment/.env \
              ${{ secrets.DOCKER_USERNAME }}/backend-app:latest
            docker image prune -f

  frontend-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for Frontend Changes
        id: check_frontend
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^frontend/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.check_frontend.outputs.changed == 'true' || contains(github.event.head_commit.message, '[all]')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and Push Frontend
        if: steps.check_frontend.outputs.changed == 'true' || contains(github.event.head_commit.message, '[all]')
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

      - name: Deploy Frontend to EC2
        if: steps.check_frontend.outputs.changed == 'true' || contains(github.event.head_commit.message, '[all]')
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PAT }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
            docker stop frontend-app || true
            docker rm frontend-app || true
            docker run -d \
              --name frontend-app \
              -p 3000:3000 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
            docker image prune -f
